name: CI/CD Pipeline - hlgraff Build & Sign

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Extract Version
        id: get_version
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          $verComma = $ver
          if ($ver.Split('.').Count -lt 4) { $verComma += ".0" * (4 - $ver.Split('.').Count) }
          echo "VERSION_COMMA=$($verComma.Replace('.', ','))" >> $env:GITHUB_OUTPUT

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution
        run: |
          msbuild src\hlgraff.sln /p:Configuration=Release /p:Platform=x86 `
          /p:DefineConstants="FILE_VERSION_STR=\\\"${{ steps.get_version.outputs.VERSION }}\\\";PRODUCT_VERSION_STR=\\\"${{ steps.get_version.outputs.VERSION }}\\\""
          
      - name: Prepare Package
        shell: powershell
        run: |
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          
          $exeFile = Get-ChildItem -Path "src" -Filter "hlgraff.exe" -Recurse | Select-Object -First 1
          if (-not $exeFile) { Write-Error "No se encontró hlgraff.exe"; exit 1 }
          mkdir dist_zip
          mkdir dist_zip\sprays
          
          cp $exeFile.FullName dist_zip\
          cp "sprays\hlgraff_logo.png" dist_zip\sprays\
          
          $iniContent = @"
          method=sequential               ;random/sequential/static
          include-mods=true               ;true/false -> sets the spray on the modfolder based on -game parameter
          sprayname=                      ;name.wad/name.png/name.jpg -> only needed when method=static
          launch=hl.exe                   ;executable to launch after applying the spray
          size=large                      ;large (default)/medium/small -> controls output spray resolution
          convert-autodeletion=true       ;true/false -> auto-delete converted wads when source image is gone
          
          
          ; [EXPERIMENTAL] servers cache sprays in custom.hpk so the change is not always
          ;   visible immediately. retry/rejoin to the same server may not reflect the new
          ;   spray. for best results:
          ;   reconnect from the server browser so the server re-sends the cache from scratch.
          cycle-on-runtime=false          ;true/false -> keep running and re-apply spray on a timer while the game is open
          cycle-delay=60                  ;seconds between spray cycles when cycle-on-runtime=true (minimum 10)
          "@
          $iniContent | Out-File -FilePath "dist_zip\spraysettings.ini" -Encoding utf8

          $readmeContent = @"
          hlgraff - GoldSrc Spray Manager
          ================================
          
          Selects, converts and applies custom spray decals before launching
          GoldSrc engine games (Half-Life, Counter-Strike, Day of Defeat,
          Sven Co-op, and any mod based on the GoldSrc engine).
          
          
          INSTALLATION
          ------------
          Extract hlgraff.exe into your game root folder so it sits next
          to hl.exe (or svencoop.exe for Sven Co-op).
          
            Example: C:\Program Files (x86)\Steam\steamapps\common\Half-Life\
          
          Create a shortcut to hlgraff.exe and add the -game flag for your mod:
          
            Half-Life          hlgraff.exe -game valve
            Counter-Strike     hlgraff.exe -game cstrike
            Day of Defeat      hlgraff.exe -game dod
            Team Fortress      hlgraff.exe -game tfc
            The Specialists    hlgraff.exe -game ts
            Adrenaline Gamer   hlgraff.exe -game ag
            Earth's Spec. F.   hlgraff.exe -game esf
            Sven Co-op         hlgraff.exe -game svencoop
          
          Any mod is supported -- use its folder name as the -game value.
          
          For Sven Co-op, also open spraysettings.ini and change:
            launch=hl.exe  ->  launch=svencoop.exe
          
          
          SPRAYS
          ------
          Place your spray files inside the sprays\ folder:
          
            Supported formats: WAD, PNG, JPG, JPEG, BMP, GIF, TIFF, TGA
          
          No conversion needed. Drop any image and it is converted
          automatically on the next launch.
          
          You can also give files special name flags before the extension:
          
            _large / _medium / _small    controls spray size
            _static                      this spray is always used
            _game-cstrike                only used in that specific mod
            _f1 / _f2 / _f3 ...         selects a frame from an animated GIF
          
          Flags can be combined in any order:
            spray_game-cstrike_small.png
            anim_f3_medium_game-ts.gif
          
          
          CONFIGURATION (spraysettings.ini)
          ----------------------------------
          The file is created automatically on first run.
          Open it with any text editor to adjust settings.
          
            method=sequential      rotation order: sequential / random / static
            sprayname=             filename to use when method=static
            size=large             default size: large / medium / small
            include-mods=true      apply spray to the active mod folder
            launch=hl.exe          game executable to launch
            convert-autodeletion=true   remove cached sprays with no source file
            gamecache-autoclear=true    clear custom.hpk when it grows too large
            gamecache-size=100     max size of custom.hpk in KB before clearing
          
            cycle-on-runtime=false [EXPERIMENTAL]
              Keep hlgraff running and rotate sprays every cycle-delay seconds
              while the game is open. Spray visibility depends on the server
              cache (custom.hpk) -- reconnect from the server browser if 
              the spray does not update in-game.
          
            cycle-delay=60         seconds between rotations (minimum 10)
          
          
          REQUIREMENTS
          ------------
          Windows 7 or later.
          "@
          $readmeContent | Out-File -FilePath "dist_zip\readme.txt" -Encoding utf8
          
          Compress-Archive -Path dist_zip\* -DestinationPath "hlgraff_v$ver.zip" -Force
          cp $exeFile.FullName .\hlgraff.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: hlgraff Release v${{ steps.get_version.outputs.VERSION }}
          files: |
            hlgraff.exe
            hlgraff_v${{ steps.get_version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
